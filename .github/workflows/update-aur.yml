name: Update AUR Packages

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to update (leave empty for all)"
        required: false

permissions:
  contents: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v4

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Check for new versions
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          cat > keyfile.toml <<'TOML'
          [keys]
          TOML
          echo "github = \"${GITHUB_TOKEN}\"" >> keyfile.toml

          nvchecker -c nvchecker.toml --keyfile keyfile.toml
          rm -f keyfile.toml

          python3 <<'PYEOF'
          import json, os

          # nvchecker v2 format: {"version": N, "data": {"pkg": {"version": "..."}}}
          old_raw = json.load(open("old_ver.json"))
          old_data = old_raw.get("data", old_raw)

          try:
              new_raw = json.load(open("new_ver.json"))
              new_data = new_raw.get("data", new_raw)
          except FileNotFoundError:
              new_data = {}

          filter_pkg = os.environ.get("INPUT_PACKAGE", "").strip()
          updates = []

          for pkg, new_info in new_data.items():
              newver = new_info["version"] if isinstance(new_info, dict) else new_info
              old_info = old_data.get(pkg, {})
              oldver = old_info.get("version", "") if isinstance(old_info, dict) else old_info

              if newver != oldver:
                  print(f"==> {pkg}: {oldver} -> {newver}")
                  if filter_pkg and filter_pkg != pkg:
                      continue
                  updates.append({"package": pkg, "version": newver})
              else:
                  print(f"==> {pkg}: {oldver} (up to date)")

          if not updates:
              print("==> All packages are up to date")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_updates={'true' if updates else 'false'}\n")
              matrix = json.dumps({"include": updates})
              f.write(f"matrix={matrix}\n")
          PYEOF

  update-and-publish:
    needs: check-versions
    if: needs.check-versions.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      matrix: ${{ fromJson(needs.check-versions.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Setup Arch Linux
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git openssh pacman-contrib python
          useradd -m builder

      - uses: actions/checkout@v4

      - name: Update PKGBUILD and test build
        run: |
          PKG_DIR="packages/${{ matrix.package }}"
          PKGBUILD="${PKG_DIR}/PKGBUILD"

          sed -i "s/^pkgver=.*/pkgver=${{ matrix.version }}/" "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"

          chown -R builder:builder "$PKG_DIR"
          cd "$PKG_DIR"
          su builder -c "updpkgsums && makepkg -sf --noconfirm"
          chown -R root:root "$PKG_DIR"

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_USERNAME: ${{ vars.AUR_USERNAME }}
          AUR_EMAIL: ${{ vars.AUR_EMAIL }}
        run: |
          mkdir -p /root/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> /root/.ssh/known_hosts 2>/dev/null

          git config --global user.name "$AUR_USERNAME"
          git config --global user.email "$AUR_EMAIL"

          PKGNAME="${{ matrix.package }}"
          PKGVER="${{ matrix.version }}"
          AUR_DIR="/tmp/aur-${PKGNAME}"

          git clone "ssh://aur@aur.archlinux.org/${PKGNAME}.git" "$AUR_DIR" || {
            mkdir -p "$AUR_DIR"
            cd "$AUR_DIR"
            git init -b master
            git remote add origin "ssh://aur@aur.archlinux.org/${PKGNAME}.git"
          }

          cp "packages/${PKGNAME}/PKGBUILD" "$AUR_DIR/"
          for f in "packages/${PKGNAME}"/*.install "packages/${PKGNAME}"/*.patch; do
            [[ -f "$f" ]] && cp "$f" "$AUR_DIR/"
          done

          chown -R builder:builder "$AUR_DIR"
          cd "$AUR_DIR"
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

          chown -R root:root "$AUR_DIR"
          git checkout -B master 2>/dev/null || true
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update ${PKGNAME} to ${PKGVER}"
            git push origin master
            echo "==> Published ${PKGNAME} v${PKGVER} to AUR"
          fi

      - name: Prepare updated PKGBUILD
        run: |
          mkdir -p /tmp/artifacts
          cp "packages/${{ matrix.package }}/PKGBUILD" "/tmp/artifacts/PKGBUILD-${{ matrix.package }}"

          python3 -c "
          import json
          data = json.load(open('old_ver.json'))
          if 'data' not in data:
              data = {'version': 1, 'data': data}
          data['data']['${{ matrix.package }}'] = {'version': '${{ matrix.version }}'}
          json.dump(data, open('old_ver.json', 'w'), indent=2)
          "
          cp old_ver.json /tmp/artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: update-${{ matrix.package }}
          path: /tmp/artifacts/

  commit-state:
    needs: update-and-publish
    runs-on: ubuntu-latest
    if: always() && needs.update-and-publish.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: update-*
          merge-multiple: true

      - name: Apply updates to repo
        run: |
          # Move updated PKGBUILDs back
          for f in PKGBUILD-*; do
            [[ -f "$f" ]] || continue
            pkg="${f#PKGBUILD-}"
            cp "$f" "packages/${pkg}/PKGBUILD"
          done

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add old_ver.json "packages/*/PKGBUILD"
          if ! git diff --cached --quiet; then
            git commit -m "chore: update package versions [skip ci]"
            git push
          fi
